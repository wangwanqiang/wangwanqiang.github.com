<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br></pre></td><td class="code"><pre><span class="line">/** Error reporting */</span><br><span class="line">error_reporting(E_ALL);</span><br><span class="line"></span><br><span class="line">/** Include path **/</span><br><span class="line">ini_set(&#x27;include_path&#x27;, ini_get(&#x27;include_path&#x27;).&#x27;;../Classes/&#x27;);</span><br><span class="line"></span><br><span class="line">/** PHPExcel */</span><br><span class="line">include &#x27;PHPExcel.php&#x27;;</span><br><span class="line"></span><br><span class="line">/** PHPExcel_Writer_Excel2007 */</span><br><span class="line">include &#x27;PHPExcel/Writer/Excel2007.php&#x27;;</span><br><span class="line"></span><br><span class="line">// Create new PHPExcel object</span><br><span class="line">echo date(&#x27;H:i:s&#x27;) . &quot; Create new PHPExcel object\n&quot;;</span><br><span class="line">$objPHPExcel = new PHPExcel();</span><br><span class="line"></span><br><span class="line">// Set properties</span><br><span class="line">echo date(&#x27;H:i:s&#x27;) . &quot; Set properties\n&quot;;</span><br><span class="line">$objPHPExcel-&gt;getProperties()-&gt;setCreator(&quot;Maarten Balliauw&quot;);</span><br><span class="line">$objPHPExcel-&gt;getProperties()-&gt;setLastModifiedBy(&quot;Maarten Balliauw&quot;);</span><br><span class="line">$objPHPExcel-&gt;getProperties()-&gt;setTitle(&quot;Office 2007 XLSX Test Document&quot;);</span><br><span class="line">$objPHPExcel-&gt;getProperties()-&gt;setSubject(&quot;Office 2007 XLSX Test Document&quot;);</span><br><span class="line">$objPHPExcel-&gt;getProperties()-&gt;setDescription(&quot;Test document for Office 2007 XLSX, generated using PHP classes.&quot;);</span><br><span class="line"></span><br><span class="line">// Add some data</span><br><span class="line">echo date(&#x27;H:i:s&#x27;) . &quot; Add some data\n&quot;;</span><br><span class="line">$objPHPExcel-&gt;setActiveSheetIndex(0);</span><br><span class="line">$objPHPExcel-&gt;getActiveSheet()-&gt;SetCellValue(&#x27;A1&#x27;, &#x27;Hello&#x27;);</span><br><span class="line">$objPHPExcel-&gt;getActiveSheet()-&gt;SetCellValue(&#x27;B2&#x27;, &#x27;world!&#x27;);</span><br><span class="line">$objPHPExcel-&gt;getActiveSheet()-&gt;SetCellValue(&#x27;C1&#x27;, &#x27;Hello&#x27;);</span><br><span class="line">$objPHPExcel-&gt;getActiveSheet()-&gt;SetCellValue(&#x27;D2&#x27;, &#x27;world!&#x27;);</span><br><span class="line"></span><br><span class="line">// Rename sheet</span><br><span class="line">echo date(&#x27;H:i:s&#x27;) . &quot; Rename sheet\n&quot;;</span><br><span class="line">$objPHPExcel-&gt;getActiveSheet()-&gt;setTitle(&#x27;Simple&#x27;);</span><br><span class="line"></span><br><span class="line">// Save Excel 2007 file</span><br><span class="line">echo date(&#x27;H:i:s&#x27;) . &quot; Write to Excel2007 format\n&quot;;</span><br><span class="line">$objWriter = new PHPExcel_Writer_Excel2007($objPHPExcel);</span><br><span class="line">$objWriter-&gt;save(str_replace(&#x27;.php&#x27;, &#x27;.xlsx&#x27;, **FILE**));</span><br><span class="line"></span><br><span class="line">// Echo done</span><br><span class="line">echo date(&#x27;H:i:s&#x27;) . &quot; Done writing file.\r\n&quot;;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
