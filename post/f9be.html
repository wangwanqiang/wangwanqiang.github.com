<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line"></span><br><span class="line"> QMenu::item &#123;</span><br><span class="line">     padding:8px 32px;/*设置菜单项文字上下和左右的内边距，效果就是菜单中的条目左右上下有了间隔*/</span><br><span class="line">     margin:0px 8px;/*设置菜单项的外边距*/</span><br><span class="line">     border-bottom:1px solid #DBDBDB;/*为菜单项之间添加横线间隔*/</span><br><span class="line">     padding-left:0px;</span><br><span class="line"> &#125;</span><br><span class="line"></span><br><span class="line"> QMenu::item:selected &#123; /* when user selects item using mouse or keyboard */</span><br><span class="line">     background-color: #00fff9;/*这一句是设置菜单项鼠标经过选中的样式*/</span><br><span class="line"> &#125;</span><br><span class="line"></span><br><span class="line">QMenu::item:checked &#123; /* checked */</span><br><span class="line">    background-color: #ff0000;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">QMenu::indicator &#123; /* delete the default icon v */</span><br><span class="line">    image: none;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>

  window.addEventListener('tabs:register', () => {

    }
    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {

      }
    }
  });
  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {
      if (!event.target.matches('.tabs-comment .tab-content .tab-pane')) return;
      let commentClass = event.target.classList[1];
      localStorage.setItem('comments_active', commentClass);
    });
  }
